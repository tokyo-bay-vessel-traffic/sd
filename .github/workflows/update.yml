name: update-schedule

# 5分ごとに公式ページを取得して data.json を自動更新する
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: schedule fetch
        run: node scrape.js

      - name: commit if changed
        run: |
          git config user.name "schedule-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "no change"
          else
            git commit -m "chore: update schedule data"
            git push
          fi
