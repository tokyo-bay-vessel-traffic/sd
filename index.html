<body><style>
  :root{
    --bg:#07131F; --bg2:#0C1E32; --panel:#0C1E32; --alt:#0A1B2D;
    --line:#264866; --line2:#356390;
    --text:#EAF3FB; --dim:#9DB6CE; --faint:#6D8299;
    --accent:#12D8E3; --accent-ink:#04222A;
    --in:#1AD07C; --out:#FF9E12; --shift:#A585FF;
    --pilot:#12D8E3; --emerald:#18D6A2;
    --shadow:0 1px 0 rgba(255,255,255,.04), 0 10px 26px -12px rgba(0,0,0,.7);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Roboto Mono",monospace;
    --jp:"Hiragino Kaku Gothic ProN","Yu Gothic",YuGothic,"Noto Sans JP",Meiryo,system-ui,sans-serif;
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#E0ECF6; --bg2:#FFFFFF; --panel:#FFFFFF; --alt:#ECF4FB;
      --line:#BED2E4; --line2:#A3BED6;
      --text:#052434; --dim:#456885; --faint:#748FA6;
      --accent:#0290A4; --accent-ink:#ffffff;
      --in:#059A57; --out:#DD7A00; --shift:#6A34C9;
      --pilot:#0290A4; --emerald:#08A87A;
      --shadow:0 1px 0 rgba(255,255,255,.7), 0 8px 20px -10px rgba(16,52,84,.32);
    }
  }
  :root[data-theme="dark"]{
    --bg:#07131F; --bg2:#0C1E32; --panel:#0C1E32; --alt:#0A1B2D;
    --line:#264866; --line2:#356390; --text:#EAF3FB; --dim:#9DB6CE; --faint:#6D8299;
    --accent:#12D8E3; --accent-ink:#04222A; --in:#1AD07C; --out:#FF9E12; --shift:#A585FF; --pilot:#12D8E3; --emerald:#18D6A2;
    --shadow:0 1px 0 rgba(255,255,255,.04), 0 10px 26px -12px rgba(0,0,0,.7);
  }
  :root[data-theme="light"]{
    --bg:#E0ECF6; --bg2:#FFFFFF; --panel:#FFFFFF; --alt:#ECF4FB;
    --line:#BED2E4; --line2:#A3BED6; --text:#052434; --dim:#456885; --faint:#748FA6;
    --accent:#0290A4; --accent-ink:#ffffff; --in:#059A57; --out:#DD7A00; --shift:#6A34C9; --pilot:#0290A4; --emerald:#08A87A;
    --shadow:0 1px 0 rgba(255,255,255,.7), 0 8px 20px -10px rgba(16,52,84,.32);
  }

  *{box-sizing:border-box;}
  body{margin:0;}
  .app{
    font-family:var(--jp);
    background:
      radial-gradient(120% 60% at 50% -10%, color-mix(in srgb, var(--accent) 9%, transparent), transparent 60%),
      var(--bg);
    color:var(--text);
    min-height:100vh;
    max-width:520px; margin:0 auto;
    -webkit-font-smoothing:antialiased;
    /* 試作：ページ全体をうっすら立体的に（浮いたシートのような影） */
    position:relative;
    box-shadow:0 0 46px -12px rgba(0,0,0,.55);
    border-inline:1px solid color-mix(in srgb, var(--text) 8%, transparent);
  }

  /* ---------- header ---------- */
  .hd{
    position:sticky; top:0; z-index:30;
    /* 夜のネイビーのパイプ風縦グラデ（深く青みのある紺。上下端=濃い→中央=白強め） */
    background:linear-gradient(180deg,
      color-mix(in srgb, #0A1972 97%, var(--bg)) 0%,
      color-mix(in srgb, #0A1972 42%, var(--bg)) 28%,
      color-mix(in srgb, #0A1972 8%, var(--bg2)) 42%,
      color-mix(in srgb, #0A1972 8%, var(--bg2)) 58%,
      color-mix(in srgb, #0A1972 42%, var(--bg)) 72%,
      color-mix(in srgb, #0A1972 97%, var(--bg)) 100%);
    border-top:2px solid color-mix(in srgb, #0A1972 98%, var(--bg));
    border-bottom:2px solid color-mix(in srgb, #0A1972 92%, var(--line));
    padding:10px 14px 8px;
    box-shadow:0 3px 12px -4px color-mix(in srgb, #0A1972 80%, transparent), inset 0 1px 0 rgba(255,255,255,.12);
  }
  .hd-top{display:flex; align-items:center; gap:11px;}
  .radar{width:44px; height:44px; flex:0 0 auto; border-radius:50%;
    background:radial-gradient(circle at 50% 42%, rgba(201,209,221,.62) 0%, rgba(176,186,201,.5) 82%);
    box-shadow:0 1px 3px -1px rgba(0,0,0,.2), inset 0 0 0 1px rgba(255,255,255,.28);}
  .brand{flex:1; min-width:0;}
  .eyebrow{
    font-family:var(--mono); font-size:9.5px; letter-spacing:.24em;
    color:#C7D1DD; text-transform:uppercase; font-weight:700;
    display:flex; align-items:center; gap:6px; margin-top:-8px;
    text-shadow:0 1px 2px rgba(0,0,0,.35);
  }
  .eyebrow::after{content:""; height:1px; flex:1; background:linear-gradient(90deg,rgba(199,209,221,.55),transparent);}
  .title{font-size:19px; font-weight:800; letter-spacing:.02em; margin:1px 0 0; line-height:1.15;
    text-shadow:0 1px 1px rgba(255,255,255,.4), 0 2px 4px rgba(0,0,0,.28);}
  .refresh{flex:0 0 auto; width:33px; height:33px; border-radius:9px; border:1px solid rgba(255,255,255,.35); background:linear-gradient(180deg, #EDF1F6, #BFC9D8); color:#16233A; font-size:18px; line-height:1; display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; box-shadow:0 1px 5px -1px rgba(0,0,0,.4);}
  .refresh:active{transform:translateY(1px);}
  .refresh:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .refresh .ricon{display:inline-block;}
  .refresh.spin .ricon{animation:rspin .9s ease-in-out infinite;}
  @keyframes rspin{to{transform:rotate(360deg);}}
  .hd-actions{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:3px;}
  .upd-mini{font-family:var(--mono); font-size:8.5px; font-weight:700; color:#CBD5E1; white-space:nowrap; line-height:1; letter-spacing:.02em;
    text-shadow:0 1px 1px rgba(255,255,255,.28), 0 1px 3px rgba(0,0,0,.55);}
  .clock{
    text-align:right; font-family:var(--mono); line-height:1.15;
  }
  .clock .cdate{font-size:15px; font-weight:600; color:var(--dim); font-variant-numeric:tabular-nums; letter-spacing:.01em; white-space:nowrap;}
  .clock .now{font-size:15px; font-weight:700; color:var(--text); font-variant-numeric:tabular-nums; margin-top:1px;}

  .controls{display:flex; align-items:center; gap:8px; margin-top:9px;}
  .seg{display:flex; background:var(--bg); border:1px solid var(--line); border-radius:9px; padding:2px; gap:2px; flex:1;}
  .seg button{
    flex:1; appearance:none; border:0; background:transparent; color:var(--dim);
    font-family:var(--jp); font-size:12.5px; font-weight:700; padding:6px 4px; border-radius:7px;
    cursor:pointer; letter-spacing:.02em; transition:.15s;
  }
  .seg button[aria-pressed="true"]{background:linear-gradient(180deg,#DEE4EC 0%,#ABB8C9 55%,#8492A6 100%); color:#233245; box-shadow:0 1px 6px -1px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.6);}
  .seg button:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .filterbar{padding:16px 12px 6px;}
  .filterbar .seg{padding:3px;}
  .filterbar .seg button{font-size:13.5px; padding:9px 4px;}
  .pilotToggle{
    appearance:none; border:1px solid var(--line); background:var(--bg); color:var(--dim);
    font-family:var(--jp); font-weight:700; font-size:12px; border-radius:9px; padding:7px 10px; cursor:pointer;
    white-space:nowrap; display:flex; align-items:center; gap:5px;
  }
  .pilotToggle[aria-pressed="true"]{border-color:var(--pilot); color:var(--pilot); background:color-mix(in srgb,var(--pilot) 12%, var(--bg));}
  .pilotToggle:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .pdot{width:7px;height:7px;border-radius:50%;background:var(--pilot);}

  /* データ古さ警告バナー */
  .stale{margin:9px 12px 0; padding:8px 11px; border-radius:9px; font-size:12px; font-weight:700; line-height:1.4; color:#7a4b00; background:#ffd98a; border:1px solid #e0a94a;}
  @media (prefers-color-scheme:dark){ .stale{color:#ffdca8; background:color-mix(in srgb,#F2A83B 20%, var(--bg)); border-color:color-mix(in srgb,#F2A83B 45%,transparent);} }
  :root[data-theme="dark"] .stale{color:#ffdca8; background:color-mix(in srgb,#F2A83B 20%, var(--bg)); border-color:color-mix(in srgb,#F2A83B 45%,transparent);}
  :root[data-theme="light"] .stale{color:#7a4b00; background:#ffd98a; border-color:#e0a94a;}

  /* ---------- 現況パネル（気象・海象） ---------- */
  .env{padding:10px 12px 2px;}
  .env-card{background:var(--bg2); border:1px solid var(--line); border-radius:12px; overflow:hidden; box-shadow:var(--shadow);}
  .env-head{display:flex; align-items:center; gap:7px; padding:7px 11px; font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); border-bottom:1px solid var(--line); background:color-mix(in srgb,var(--accent) 7%, var(--bg2));}
  .env-head b{color:var(--text); font-weight:700; letter-spacing:0; font-size:11px; font-family:var(--jp);}
  .env-row{display:flex; align-items:center; gap:9px; padding:8px 11px; border-bottom:1px solid var(--line);}
  .env-row:last-child{border-bottom:0;}
  .env-ico{font-size:17px; line-height:1; flex:0 0 auto; width:20px; text-align:center;}
  .env-lbl{font-family:var(--mono); font-size:8.5px; letter-spacing:.06em; color:var(--faint); text-transform:uppercase; flex:0 0 auto;}
  .env-val{font-family:var(--mono); font-variant-numeric:tabular-nums; color:var(--text); font-size:12.5px; font-weight:600;}
  .env-sep{color:var(--faint); margin:0 2px;}
  /* 天気行 */
  .wx-text{font-family:var(--jp); font-weight:700; font-size:13.5px; line-height:1.2;}
  .wx-sub{font-family:var(--mono); font-size:13.5px; color:var(--dim); margin-top:3px; font-variant-numeric:tabular-nums;}
  .wx-sub .hi{color:var(--out); font-weight:800;}
  .wx-sub .lo{color:#4ea3e8; font-weight:800;}
  @media (prefers-color-scheme:light){ .wx-sub .lo{color:#2f7cc0;} }
  :root[data-theme="light"] .wx-sub .lo{color:#2f7cc0;}
  .wx-sub .pop{color:var(--accent); font-weight:800;}
  .wx-sub .wx-pfx{font-size:11px; font-weight:600;}
  .radar-btn{margin-left:auto; flex:0 0 auto; display:flex; align-items:center; gap:5px; text-decoration:none;
    font-family:var(--jp); font-weight:800; font-size:11px; line-height:1.05; color:#243247;
    background:linear-gradient(180deg,#DEE4EC 0%,#AEBACB 52%,#8492A6 100%); padding:9px 12px; border-radius:10px;
    border:0; box-shadow:0 2px 8px -2px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.6);}
  .radar-btn .ri{font-size:14px;}
  .radar-btn:active{transform:translateY(1px);}
  /* 日出入・風・潮 行の値並び */
  .env-pair{display:flex; align-items:baseline; gap:5px;}
  .env-flow{display:flex; flex-wrap:wrap; align-items:baseline; gap:4px 12px; min-width:0;}
  .env-val .u{font-size:8.5px; color:var(--faint); margin-left:1px; font-weight:500;}
  .env-val .cm{color:var(--dim); font-weight:700;}
  /* 風向（東・東北東）を観測地点名（十号地・海ほたる）と同じ大きさに */
  .env-val .wdir{font-size:8.5px; font-weight:600; color:var(--dim);}
  .tide-hi{color:var(--out);} .tide-lo{color:#4ea3e8;}
  :root[data-theme="light"] .tide-lo{color:#2f7cc0;}
  @media (prefers-color-scheme:light){ .tide-lo{color:#2f7cc0;} }
  /* 潮名チップ（大潮/中潮/小潮/長潮/若潮） */
  .tide-name{margin-left:auto; flex:0 0 auto; align-self:center; font-family:var(--jp); font-weight:800; font-size:12.5px; padding:3px 10px; border-radius:8px; letter-spacing:.04em; white-space:nowrap;}
  .tide-name.tn-o{color:var(--out); background:color-mix(in srgb,var(--out) 16%,transparent); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--out) 45%,transparent);}
  .tide-name.tn-b{color:#3f97e0; background:color-mix(in srgb,#3f97e0 16%,transparent); box-shadow:inset 0 0 0 1px color-mix(in srgb,#3f97e0 45%,transparent);}

  function toRomaji(input){
    let s=(input||'').replace(/[ぁ-ゖ]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60)); // ひらがな→カタカナ
    s=zen2han(s); // 全角英数→半角
    let out='',i=0;
    while(i<s.length){
      const two=s.substr(i,2), one=s[i];
      if(one==='ッ'){ const r=ROMA_KANA[s.substr(i+1,2)]||ROMA_KANA[s[i+1]]||''; if(r && !'aeiou'.includes(r[0]) && /[a-z]/i.test(r[0])) out+=r[0]; i++; continue; }
      if(one==='ー'){ const m=out.match(/[aeiou]$/i); if(m) out+=m[0]; i++; continue; }
      if(ROMA_KANA[two]){ out+=ROMA_KANA[two]; i+=2; continue; }
      if(ROMA_KANA[one]){ out+=ROMA_KANA[one]; i++; continue; }
      if(ROMA_KANJI[one]){ out+=ROMA_KANJI[one]; i++; continue; }
      out+=one; i++;
    }
    // 長音の整理（ヘボン式）：ひょうご→HYOGO、とうきょう→TOKYO、りゅう→RYU など
    return out.toUpperCase().replace(/OU/g,'O').replace(/UU/g,'U').replace(/\s+/g,' ').trim();
  }

    'みかづき':'431023647','まや':'431023117','みふね':'431016596','みさき':'431008693',
    'みゆき':'431008365','みかげ':'431006885','ふたば':'431006049','みくら':'431003009',
    'まいこ':'431000527','ひよどり':'431000132','あしや':'431501871','いくた':'431501857','ひょうご':'431402037',
    'たかとり':'431016184','たちばな':'431010875','たからづか':'431009418','ときわ':'431009243',
    'たもん':'431000898','てんま':'431402072','こうよう':'431301812'
  };
  const SHIP_MMSI = {};
  Object.keys(SHIP_MMSI_RAW).forEach(k=>{ SHIP_MMSI[normShip(k)] = SHIP_MMSI_RAW[k]; });
  // VesselFinder リンク：対応表があれば直リンク（IMO=船詳細／MMSI=地図センタリング）、無ければローマ字で船名検索
  function mtHref(ship){
    const id = SHIP_MMSI[normShip(ship)];
    if (id) {
      // 7桁=IMO → 船詳細ページ直リンク／9桁=MMSI → その船に地図をセンタリング
      if (String(id).length === 7) return 'https://www.vesselfinder.com/vessels/details/' + id;
      return 'https://www.vesselfinder.com/?mmsi=' + id;
    }
    return 'https://www.vesselfinder.com/vessels?name=' + encodeURIComponent(toRomaji(ship));
  }

  // ===== 表示対象外リスト（ここを編集すれば除外内容を変更できます） =====
  // 船名（全角/半角・スペースは無視して一致判定）／「押船」を含む船は自動で除外
  const EXCLUDE_SHIPS = new Set(
    ['ひまわり５','竜王','第５栄豊丸','パシフィック ファルコン','パシフィック ブリーズ',
     'シンフォニー モデルナ','フェリーりつりん','フェリーびざん','ひまわりとうきょう','橘丸']
    .map(normShip));
  // バース（完全一致）
  const EXCLUDE_BERTHS = new Set(
    ['P','KK','中防東','NA','LOB','LLB','LE','VAC','C','LLE','LLD','LLC','LLF','LM1','LM2','M']);
  // ふ頭（係船＝東京港港湾情報システムの航路）完全一致
  const EXCLUDE_FU = new Set(['辰巳','大井水産・食品']);
  function isExcluded(ship, berth, route){
    const sk=normShip(ship);
    if(sk.indexOf('押船')>=0 || sk.indexOf('曳船')>=0) return true;
    if(EXCLUDE_SHIPS.has(sk)) return true;
    const bk=(berth||'').trim().replace(/（/g,'(').replace(/）/g,')');
    if(EXCLUDE_BERTHS.has(bk)) return true;
    return EXCLUDE_FU.has((route||'').trim());
  }
  // バース表示の置換（客船埠頭 → AP 等）
  const BERTH_ABBR = {'客船埠頭':'AP'};

  // 港湾システムの「ふ頭」名を狭い航路チップ用に短縮
  const FU_ABBR = {
    '大井コンテナ(TPT)':'大井C','大井コンテナ（TPT）':'大井C','大井水産・食品':'大井水','大井建材':'大井建',
    '若洲建材':'若洲','中防外側':'中防外','中防内側':'中防内','１０号その２':'10号2','10号その2':'10号2'
  };
  function abbrFu(n){
    if(FU_ABBR[n]) return FU_ABBR[n];
    n=(n||'').replace(/[０-９]/g,d=>String.fromCharCode(d.charCodeAt(0)-0xFEE0));
    n=n.replace(/コンテナ.*/,'C').replace(/・.*$/,'').replace(/建材/,'建').replace(/(外|内)側$/,'$1').replace(/その/,'');
    return n.length>4 ? n.slice(0,4) : n;
  }

  let ROUTE='all', DATA=[], UPDATED='';

  function normalize(raw){
    const arr = raw.filter(r=> !isExcluded(r.ship, r.berth, r.route)).map(r=>({
      time:r.time, min:hm(r.time), hour:hourOf(r.time), t:clock(r.time),
      dir:r.dir, dc:DIRC[r.dir]||'shift',
      berth:dec(r.berth).replace(/\s*=?>\s*/,'→').replace(/\s+/g,' ').trim(),  // シフトの矢印は詰めて表記（例 X4→X5）＝見切れ防止
      ship:dec(r.ship), length:r.length||'', tons:r.tons||'',
      pilot:(r.pilot==='有'), route:r.route, port:!!r.port,
      ds: dayOffset((r.time||'').slice(0,5))*1440 + hm(r.time)   // 日付＋時刻の通し順
    })).sort((a,b)=> a.ds-b.ds || (a.route<b.route?-1:1));
    // 港湾システムの消え残り対策：港湾行のみ「現在時刻−1時間」より前を削除（東/西は対象外）
    const d=new Date(); const cutoff = d.getHours()*60 + d.getMinutes() - 60;
    return arr.filter(r=> !r.port || r.ds >= cutoff);
  }

  function nowMin(){ const d=new Date(); return d.getHours()*60+d.getMinutes(); }

  function render(){
    const list=$('#list'); list.innerHTML='';
    let rows=DATA.filter(r=> ROUTE==='all' ? true : (ROUTE==='port' ? r.port : r.route===ROUTE));
    if(!rows.length){ list.innerHTML='<div class="empty">該当する予定はありません</div>'; return; }
    let prevDate=null, prevHour=null;
    const frag=document.createDocumentFragment();
    rows.forEach((r)=>{
      const dstr=(r.time||'').slice(0,5); // MM/DD
      if(dstr!==prevDate){
        frag.appendChild(makeDateHdr(dstr));   // 日付の区切り（見出し行）
        prevDate=dstr; prevHour=null;
      } else if(prevHour!==null && r.hour!==prevHour){
        const hb=document.createElement('div'); hb.className='hourbreak'; frag.appendChild(hb); // 1時間ごとの太字罫線
      }
      prevHour=r.hour;
      const hc=hourColor(r.hour);
      const el=document.createElement('div');
      el.className='row d-'+r.dc;
      el.style.setProperty('--hc',hc);
      const isPort=r.port;
      const rr = r.route==='東'?'e':(r.route==='西'?'w':'p');
      const routeLabel = isPort? abbrFu(r.route) : r.route;
      const big = parseInt(r.length,10) >= 300;   // 長さ300m以上は強調
      const lenDisp = (r.length==='-'||r.length==='')?'-':r.length+'m';
      const tonDisp = (r.tons==='-'||r.tons==='')?'-':r.tons+'t';
      const berthDisp = BERTH_ABBR[(r.berth||'').trim()] || r.berth;
      el.innerHTML=
        `<div class="c-time">${r.t}</div>`+
        `<div class="c-dir"><span class="pill ${r.dc}">${DIRSHORT[r.dir]||r.dir}</span></div>`+
        `<div class="c-berth${berthDisp.length<=5?'':(berthDisp.length<=7?' bs':' bxs')}">${escapeHtml(berthDisp)}</div>`+
        `<div class="c-ship${big?' big':''}">`+
          `<div class="ship-nm"><a class="mt-link" href="${mtHref(r.ship)}" target="_blank" rel="noopener">${escapeHtml(r.ship)}</a></div>`+
          `<div class="ship-meta"><b>${lenDisp}</b>　<b>${tonDisp}</b></div>`+
        `</div>`+
        `<div class="c-pilot">${r.pilot?'<span class="pbadge yes">P</span>':'<span class="pbadge no">−</span>'}</div>`+
        `<div class="c-route"><span class="route ${rr}${isPort?' port':''}"${isPort?` title="${escapeHtml(r.route)}"`:''}>${escapeHtml(routeLabel)}</span></div>`;
      frag.appendChild(el);
    });
    list.appendChild(frag);
  }
  const fmt = n => { const v=parseInt(n,10); return isNaN(v)? (n||'') : v.toLocaleString('en-US'); };
  const escapeHtml = s => s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

  // ---- 現況パネル ----
  function wxIcon(t){ t=t||'';
    if(/雪/.test(t)) return '❄️'; if(/雷/.test(t)) return '⛈️';
    const rain=/雨/.test(t), sun=/晴/.test(t), cloud=/曇|くもり/.test(t);
    if(rain&&(sun||cloud)) return '🌦️'; if(rain) return '🌧️';
    if(sun&&cloud) return '⛅'; if(cloud) return '☁️'; if(sun) return '☀️'; return '🌊';
  }
  function tideCls(n){ n=n||''; if(/大潮/.test(n)) return 'tn-o'; if(/小潮/.test(n)) return 'tn-b'; if(/中潮/.test(n)) return 'tn-n'; return 'tn-d'; }

  const WD=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  // MM/DD の当日からの日数差（年跨ぎ考慮）。日付＋時刻の昇順ソートに使う
  function dayOffset(mmdd){
    const p=(mmdd||'').split('/'); if(p.length<2) return 0;
    const mm=+p[0], dd=+p[1]; const now=new Date(); let yr=now.getFullYear();
    if(now.getMonth()===11 && mm===1) yr++;
    const dt=new Date(yr,mm-1,dd), today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    return Math.round((dt-today)/86400000);
  }
  // スケジュールの日付見出し（例: 07/08 Wednesday / 翌日 07/09 Thursday）
  function makeDateHdr(mmdd){
    const p=(mmdd||'').split('/'); const mm=+p[0], dd=+p[1];
    const now=new Date();
    let yr=now.getFullYear();
    if(now.getMonth()===11 && mm===1) yr++;        // 年末→年始の跨ぎ
    const dt=new Date(yr, mm-1, dd);
    const wd=WD[dt.getDay()]||'';
    const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    const diff=Math.round((dt-today)/86400000);
    const rel = diff===1?'翌日':diff===2?'翌々日':(diff>2?`${diff}日後`:'');
    const el=document.createElement('div'); el.className='datehdr';
    el.innerHTML=`${rel?`<span class="rel">${rel}</span>`:''}<span class="dmd">${mmdd}</span> <span class="dwd">${wd}</span>`;
    return el;
  }
  function renderEnv(e){
    if(!e){ $('#env').innerHTML=''; return; }
    const w=e.weather||{}, s=e.sun||{}, td=e.tide||{}, wd=e.wind||{};
    const tideSpan = arr => (arr||[]).map(x=>`<span class="env-val"><b>${x.t}</b> <span class="cm">${x.cm}</span><span class="u">㎝</span></span>`).join('<span class="env-sep">/</span>') || '<span class="env-val">--</span>';
    const windOne = o => o&&(o.spd!=null)? `<span class="env-val"><span class="wdir">${o.dir||''}</span> <b>${o.spd}</b><span class="u">m/s</span></span>` : '<span class="env-val">--</span>';
    $('#env').innerHTML =
     `<div class="env-card">
        <div class="env-row wx">
          <div class="env-ico">${wxIcon(w.text)}</div>
          <div style="flex:1;min-width:0;">
            <div class="wx-text">${w.text||'--'}</div>
            <div class="wx-sub"><span class="hi">${w.max??'--'}°</span><span class="env-sep">/</span><span class="lo">${w.min??'--'}°</span><span class="env-sep">•</span><span class="wx-pfx">降水</span> <span class="pop">${w.pop??'--'}%</span></div>
          </div>
          ${e.radar? `<a class="radar-btn" href="${e.radar}" target="_blank" rel="noopener"><span class="ri">☔</span>雨雲<br>レーダー</a>`:''}
        </div>
        <div class="env-row">
          <div class="env-ico">🌅</div>
          <div class="env-flow">
            <span class="env-pair"><span class="env-lbl">日の出</span><span class="env-val">${s.rise||'--:--'}</span></span>
            <span class="env-pair"><span class="env-lbl">日の入</span><span class="env-val">${s.set||'--:--'}</span></span>
          </div>
        </div>
        <div class="env-row">
          <div class="env-ico">🌊</div>
          <div class="env-flow">
            <span class="env-pair"><span class="env-lbl tide-hi">満潮</span>${tideSpan(td.high)}</span>
            <span class="env-pair"><span class="env-lbl tide-lo">干潮</span>${tideSpan(td.low)}</span>
          </div>
          ${td.name? `<span class="tide-name ${tideCls(td.name)}">${td.name}</span>`:''}
        </div>
        <div class="env-row">
          <div class="env-ico">🧭</div>
          <div class="env-flow">
            <span class="env-pair"><span class="env-lbl">十号地</span>${windOne(wd.jugouchi)}</span>
            <span class="env-pair"><span class="env-lbl">海ほたる</span>${windOne(wd.umihotaru)}</span>
          </div>
        </div>
      </div>`;
  }

  // controls
  document.querySelectorAll('.seg button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.seg button').forEach(x=>x.setAttribute('aria-pressed', x===b));
    ROUTE=b.dataset.route; render();
  }));


  // header height -> sticky offsets
  function setH(){ const h=document.querySelector('.hd').offsetHeight; document.documentElement.style.setProperty('--hdH', (h)+'px'); }

  // load: try live data.json, fall back to embedded
  // 一部でエラーが出ても白画面にしない：各処理をtry/catchで隔離
  function checkStale(fetchedAt, live){
    const bar=$('#staleBar'); if(!bar) return;
    let show=false, txt='';
    if(live && fetchedAt){
      const t=Date.parse(fetchedAt);
      if(!isNaN(t)){
        const min=(Date.now()-t)/60000;
        if(min>120){ show=true; const h=Math.floor(min/60), m=Math.floor(min%60); txt=(h>0?h+'時間':'')+m+'分前'; }
      }
    }
    if(show){ bar.textContent='⚠ データが更新されていません（最終取得 '+txt+'）。表示は直近の内容です。'; bar.hidden=false; }
    else { bar.hidden=true; }
  }
  function boot(data, updated, env, fetchedAt, live){
    try{ DATA=normalize(data||[]); }catch(e){ DATA=[]; }
    UPDATED=updated||'';
    try{ $('#upd').textContent=UPDATED||'—'; const _um=$('#updMini'); if(_um) _um.textContent=UPDATED||'—'; }catch(e){}
    try{ renderEnv(env||ENV_SNAPSHOT); }catch(e){}
    try{ render(); }catch(e){ const l=$('#list'); if(l) l.innerHTML='<div class="empty">表示の生成に失敗しました。右上の ⚓ ボタンで再読み込みしてください。</div>'; }
    try{ setH(); }catch(e){}
    try{ checkStale(fetchedAt, live); }catch(e){}
  }
  function loadData(){
    return fetch('data.json?t='+Date.now(),{cache:'no-store'}).then(r=>{ if(!r.ok) throw 0; return r.json(); })
      .then(j=> boot(j.rows||j, j.updated, j.env, j.fetchedAt, true))
      .catch(()=> boot(EMBEDDED, '（収録データ）', ENV_SNAPSHOT, null, false));
  }
  const _rb=document.getElementById('refreshBtn');
  if(_rb) _rb.addEventListener('click',()=>{ _rb.classList.add('spin'); loadData().finally(()=> setTimeout(()=>_rb.classList.remove('spin'),500)); });
  loadData();
  window.addEventListener('resize', setH);

  // radar sweep
  (function(){
    const c=document.querySelector('.radar'); if(!c) return;
    const ctx=c.getContext('2d'); const W=88,H=88,cx=44,cy=44,R=40;
    const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    const css=getComputedStyle(document.documentElement);
    function col(){ return '#93A2B5'; } /* レーダー：白シルバー円盤に映える柔らかいシルバー線 */
    const blips=[[0.55,1.9],[0.8,3.6],[0.4,5.1],[0.7,0.6]];
    let a=0;
    function frame(){
      const ac=col();
      ctx.clearRect(0,0,W,H);
      ctx.strokeStyle=hexA(ac,.34); ctx.lineWidth=1;
      [0.5,0.78,1].forEach(f=>{ctx.beginPath();ctx.arc(cx,cy,R*f,0,7);ctx.stroke();});
      ctx.beginPath();ctx.moveTo(cx-R,cy);ctx.lineTo(cx+R,cy);ctx.moveTo(cx,cy-R);ctx.lineTo(cx,cy+R);ctx.stroke();
      // sweep
      const g=ctx.createConicGradient? null:null;
      ctx.save(); ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,R,a-0.9,a); ctx.closePath();
      const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
      grd.addColorStop(0, hexA(ac,.0)); grd.addColorStop(1, hexA('#57616F',.6));
      ctx.fillStyle=grd; ctx.fill(); ctx.restore();
      ctx.strokeStyle=hexA('#454F5D',.95); ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);ctx.stroke();
      // blips
      blips.forEach(([rr,ang])=>{ const bx=cx+Math.cos(ang)*R*rr, by=cy+Math.sin(ang)*R*rr;
        let d=a-ang; d=((d%(Math.PI*2))+Math.PI*2)%(Math.PI*2); const fade=Math.max(0,1-d/2.2);
        ctx.fillStyle=hexA(ac,.15+fade*.85); ctx.beginPath(); ctx.arc(bx,by,1.7+fade*1.3,0,7); ctx.fill(); });
      if(!reduce){ a+=0.03; requestAnimationFrame(frame); }
    }
    function hexA(h,al){ h=h.replace('#',''); if(h.length===3)h=h.split('').map(x=>x+x).join('');
      const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
      if(isNaN(r)) return `rgba(56,214,208,${al})`; return `rgba(${r},${g},${b},${al})`; }
    frame();
  })();
</script>
