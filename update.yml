name: update-schedule

# 5分ごとに公式ページを取得して data.json を自動更新する
on:
  schedule:
    # :03,:08,:13… と「ちょうど」からずらして混雑を回避（発火率UP）。GitHubの都合で遅延はあり得る
    - cron: "3-59/5 * * * *"
  workflow_dispatch:          # 手動実行ボタン用

permissions:
  contents: write

# 実行の重複を防ぐ（前の実行が長引いても詰まらない・push競合を防ぐ）
concurrency:
  group: update-schedule
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 8          # 万一ハングしても8分で打ち切り（次回に影響させない）
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: スケジュール取得
        run: node scrape.js

      - name: 変更があればコミット
        run: |
          git config user.name "schedule-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "更新なし"
            exit 0
          fi
          git commit -m "chore: update schedule data"
          # push が競合しても最新を取り込んでリトライ（データが止まらないように）
          for i in 1 2 3; do
            if git push; then
              echo "pushed"
              exit 0
            fi
            echo "push retry $i"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" || true
            sleep 3
          done
          echo "push failed after retries"
          exit 1
